# ──────────────────────────────────────────────────────────────
# Deploy Pipeline for Kutty Story
# Triggers after CI passes on main branch
# ──────────────────────────────────────────────────────────────

name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types:
      - completed

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            cd /var/www/kutty-story
            bash infrastructure/scripts/deploy.sh

      - name: Health Check
        run: |
          echo "Waiting for services to stabilize..."
          sleep 15

          # Check API health
          API_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://api.kuttystory.com/health" || echo "000")
          echo "API health check: $API_STATUS"

          # Check Web
          WEB_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://kuttystory.com" || echo "000")
          echo "Web health check: $WEB_STATUS"

          # Check Admin
          ADMIN_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://admin.kuttystory.com" || echo "000")
          echo "Admin health check: $ADMIN_STATUS"

          if [ "$API_STATUS" != "200" ] || [ "$WEB_STATUS" != "200" ] || [ "$ADMIN_STATUS" != "200" ]; then
            echo "WARNING: One or more health checks did not return 200"
            echo "API=$API_STATUS Web=$WEB_STATUS Admin=$ADMIN_STATUS"
            exit 1
          fi

          echo "All health checks passed!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed or health checks did not pass. Check the logs above."
